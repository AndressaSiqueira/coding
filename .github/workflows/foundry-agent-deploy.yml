name: Foundry Agent Deploy

on:
  push:
    branches: [main]
    paths:
      - 'foundry-agent/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even without changes'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}
  AZURE_AI_PROJECT_NAME: ${{ secrets.AZURE_AI_PROJECT_NAME }}
  AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ secrets.AZURE_AI_MODEL_DEPLOYMENT_NAME }}

jobs:
  check-evaluation:
    name: Verify Evaluation Passed
    runs-on: ubuntu-latest
    outputs:
      evaluation_passed: ${{ steps.check.outputs.passed }}
    
    steps:
      - name: Check Last Evaluation Status
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'push') {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'foundry-agent-evaluate.yml',
                head_sha: context.sha,
                status: 'completed',
                per_page: 1
              });
              
              if (runs.workflow_runs.length === 0) {
                core.warning('No evaluation run found for this commit. Proceeding.');
                core.setOutput('passed', 'true');
                return;
              }
              
              const latestRun = runs.workflow_runs[0];
              if (latestRun.conclusion === 'success') {
                core.setOutput('passed', 'true');
              } else {
                core.setOutput('passed', 'false');
                core.setFailed(`Evaluation workflow did not pass: ${latestRun.conclusion}`);
              }
            } else {
              core.setOutput('passed', 'true');
            }

  deploy:
    name: Deploy to Azure AI Foundry
    runs-on: ubuntu-latest
    needs: check-evaluation
    if: needs.check-evaluation.outputs.evaluation_passed == 'true'
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Azure AI SDK
        run: |
          pip install azure-ai-projects azure-identity

      - name: Read Agent Configuration
        id: config
        run: |
          AGENT_NAME=$(grep '^name:' foundry-agent/agent.yaml | cut -d'"' -f2)
          echo "agent_name=$AGENT_NAME" >> $GITHUB_OUTPUT
          echo "Agent Name: $AGENT_NAME"

      - name: Deploy Agent via Azure AI SDK
        id: deploy
        env:
          AGENT_NAME: ${{ steps.config.outputs.agent_name }}
        run: |
          python << 'EOF'
          import os
          from azure.identity import DefaultAzureCredential
          from azure.ai.projects import AIProjectClient
          
          # Read configuration
          endpoint = os.environ["AZURE_AI_PROJECT_ENDPOINT"]
          model = os.environ["AZURE_AI_MODEL_DEPLOYMENT_NAME"]
          agent_name = os.environ["AGENT_NAME"]
          
          # Read instructions
          with open("foundry-agent/instructions.md", "r") as f:
              instructions = f.read()
          
          print(f"Endpoint: {endpoint}")
          print(f"Model: {model}")
          print(f"Agent Name: {agent_name}")
          
          # Initialize client with DefaultAzureCredential (uses OIDC from azure/login)
          credential = DefaultAzureCredential()
          client = AIProjectClient(endpoint=endpoint, credential=credential)
          
          # List existing agents to check if update or create
          print("\nListing existing agents...")
          existing_agent = None
          try:
              agents = client.agents.list_agents()
              for agent in agents.data:
                  print(f"  Found: {agent.name} (id: {agent.id})")
                  if agent.name == agent_name:
                      existing_agent = agent
                      break
          except Exception as e:
              print(f"Could not list agents: {e}")
          
          # Create or update agent
          if existing_agent:
              print(f"\nUpdating existing agent: {existing_agent.id}")
              agent = client.agents.update_agent(
                  assistant_id=existing_agent.id,
                  name=agent_name,
                  model=model,
                  instructions=instructions
              )
              print(f"Agent updated: {agent.id}")
          else:
              print(f"\nCreating new agent: {agent_name}")
              agent = client.agents.create_agent(
                  name=agent_name,
                  model=model,
                  instructions=instructions
              )
              print(f"Agent created: {agent.id}")
          
          # Output for summary
          print(f"\n=== Deployment Complete ===")
          print(f"Agent ID: {agent.id}")
          print(f"Agent Name: {agent.name}")
          print(f"Model: {agent.model}")
          
          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"agent_id={agent.id}\n")
              f.write(f"deployment_status=success\n")
          EOF

      - name: Create Deployment Summary
        run: |
          echo "## 🚀 Foundry Agent Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Name | ${{ steps.config.outputs.agent_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent ID | ${{ steps.deploy.outputs.agent_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ env.AZURE_AI_PROJECT_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.deploy.outputs.deployment_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify the agent in [Azure AI Foundry](https://ai.azure.com/)" >> $GITHUB_STEP_SUMMARY
          echo "2. Test the agent with sample queries" >> $GITHUB_STEP_SUMMARY
