name: Foundry Agent Deploy

on:
  push:
    branches: [main]
    paths:
      - 'foundry-agent/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even without changes'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}
  AZURE_AI_PROJECT_NAME: ${{ secrets.AZURE_AI_PROJECT_NAME }}
  AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ secrets.AZURE_AI_MODEL_DEPLOYMENT_NAME }}

jobs:
  check-evaluation:
    name: Verify Evaluation Passed
    runs-on: ubuntu-latest
    outputs:
      evaluation_passed: ${{ steps.check.outputs.passed }}
    
    steps:
      - name: Check Last Evaluation Status
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'push') {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'foundry-agent-evaluate.yml',
                head_sha: context.sha,
                status: 'completed',
                per_page: 1
              });
              
              if (runs.workflow_runs.length === 0) {
                core.warning('No evaluation run found for this commit. Proceeding.');
                core.setOutput('passed', 'true');
                return;
              }
              
              const latestRun = runs.workflow_runs[0];
              if (latestRun.conclusion === 'success') {
                core.setOutput('passed', 'true');
              } else {
                core.setOutput('passed', 'false');
                core.setFailed(`Evaluation workflow did not pass: ${latestRun.conclusion}`);
              }
            } else {
              core.setOutput('passed', 'true');
            }

  deploy:
    name: Deploy to Azure AI Foundry
    runs-on: ubuntu-latest
    needs: check-evaluation
    if: needs.check-evaluation.outputs.evaluation_passed == 'true'
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install openai azure-identity

      - name: Read Agent Configuration
        id: config
        run: |
          AGENT_NAME=$(grep '^name:' foundry-agent/agent.yaml | cut -d'"' -f2)
          echo "agent_name=$AGENT_NAME" >> $GITHUB_OUTPUT
          echo "Agent Name: $AGENT_NAME"

      - name: Deploy Assistant via Azure OpenAI
        id: deploy
        env:
          AGENT_NAME: ${{ steps.config.outputs.agent_name }}
        run: |
          python << 'EOF'
          import os
          from openai import AzureOpenAI
          from azure.identity import DefaultAzureCredential, get_bearer_token_provider
          
          # Read configuration
          endpoint = os.environ["AZURE_AI_PROJECT_ENDPOINT"].rstrip("/")
          model = os.environ["AZURE_AI_MODEL_DEPLOYMENT_NAME"]
          agent_name = os.environ["AGENT_NAME"]
          
          # Read instructions
          with open("foundry-agent/instructions.md", "r") as f:
              instructions = f.read()
          
          print(f"Endpoint: {endpoint}")
          print(f"Model: {model}")
          print(f"Agent Name: {agent_name}")
          
          # Get token provider for Azure AD authentication
          credential = DefaultAzureCredential()
          token_provider = get_bearer_token_provider(
              credential, "https://cognitiveservices.azure.com/.default"
          )
          
          # Initialize Azure OpenAI client
          client = AzureOpenAI(
              azure_endpoint=endpoint,
              azure_ad_token_provider=token_provider,
              api_version="2024-05-01-preview"
          )
          
          # List existing assistants to check if update or create
          print("\nListing existing assistants...")
          existing_assistant = None
          try:
              assistants = client.beta.assistants.list(limit=100)
              for assistant in assistants.data:
                  print(f"  Found: {assistant.name} (id: {assistant.id})")
                  if assistant.name == agent_name:
                      existing_assistant = assistant
                      break
          except Exception as e:
              print(f"Could not list assistants: {e}")
          
          # Create or update assistant
          if existing_assistant:
              print(f"\nUpdating existing assistant: {existing_assistant.id}")
              assistant = client.beta.assistants.update(
                  assistant_id=existing_assistant.id,
                  name=agent_name,
                  model=model,
                  instructions=instructions,
                  tools=[{"type": "code_interpreter"}, {"type": "file_search"}]
              )
              print(f"Assistant updated: {assistant.id}")
          else:
              print(f"\nCreating new assistant: {agent_name}")
              assistant = client.beta.assistants.create(
                  name=agent_name,
                  model=model,
                  instructions=instructions,
                  tools=[{"type": "code_interpreter"}, {"type": "file_search"}]
              )
              print(f"Assistant created: {assistant.id}")
          
          # Output for summary
          print(f"\n=== Deployment Complete ===")
          print(f"Assistant ID: {assistant.id}")
          print(f"Assistant Name: {assistant.name}")
          print(f"Model: {assistant.model}")
          
          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"agent_id={assistant.id}\n")
              f.write(f"deployment_status=success\n")
          EOF

      - name: Create Deployment Summary
        run: |
          echo "## 🚀 Foundry Agent Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Name | ${{ steps.config.outputs.agent_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent ID | ${{ steps.deploy.outputs.agent_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ env.AZURE_AI_PROJECT_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.deploy.outputs.deployment_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify the assistant in [Azure AI Foundry](https://ai.azure.com/)" >> $GITHUB_STEP_SUMMARY
          echo "2. Test the assistant with sample queries" >> $GITHUB_STEP_SUMMARY
