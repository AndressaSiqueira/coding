name: Agent Quality Check

on:
  # Triggers for human-created PRs
  pull_request:
    paths:
      - 'foundry-agent/**'
    types: [opened, synchronize, reopened]
  
  # Triggers when Continuous Triage workflow completes (for bot-created PRs)
  workflow_run:
    workflows: ["Continuous Triage"]
    types: [completed]
  
  workflow_dispatch:
    inputs:
      debug:
        description: Run with debug output
        required: false
        type: boolean
        default: false
      pr_number:
        description: PR number to evaluate (optional)
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}

jobs:
  # Find PR to evaluate when triggered by workflow_run
  find-pr:
    name: Find PR to Evaluate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    outputs:
      pr_number: ${{ steps.find.outputs.pr_number }}
      pr_ref: ${{ steps.find.outputs.pr_ref }}
      should_evaluate: ${{ steps.find.outputs.should_evaluate }}
    steps:
      - name: Find open PR modifying foundry-agent
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            // Find open PRs
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 10
            });
            
            // Find a PR that modifies foundry-agent/
            for (const pr of prs) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              
              const modifiesAgent = files.some(f => f.filename.startsWith('foundry-agent/'));
              
              if (modifiesAgent) {
                console.log(`Found PR #${pr.number} modifying foundry-agent/`);
                core.setOutput('pr_number', pr.number);
                core.setOutput('pr_ref', pr.head.sha);
                core.setOutput('should_evaluate', 'true');
                return;
              }
            }
            
            console.log('No open PR found modifying foundry-agent/');
            core.setOutput('should_evaluate', 'false');

  evaluate:
    name: Evaluate Agent Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [find-pr]
    if: |
      always() && 
      (github.event_name == 'pull_request' || 
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'workflow_run' && needs.find-pr.outputs.should_evaluate == 'true'))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Checkout PR head for evaluation
          ref: ${{ github.event.pull_request.head.sha || needs.find-pr.outputs.pr_ref || github.ref }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Agent Configuration
        id: validate
        run: |
          echo "Validating Foundry agent configuration..."
          
          if [ ! -f "foundry-agent/agent.yaml" ]; then
            echo "::error::Missing foundry-agent/agent.yaml"
            exit 1
          fi
          
          if [ ! -f "foundry-agent/instructions.md" ]; then
            echo "::error::Missing foundry-agent/instructions.md"
            exit 1
          fi
          
          if [ ! -f "eval/dataset.json" ]; then
            echo "::error::Missing eval/dataset.json"
            exit 1
          fi
          
          echo "All required files present"
          echo "validated=true" >> $GITHUB_OUTPUT

      - name: Static Validation
        id: static-eval
        run: |
          echo "Running static validation..."
          ERRORS=0
          
          if ! grep -q "name:" foundry-agent/agent.yaml; then
            echo "::warning::agent.yaml missing name field"
            ERRORS=$((ERRORS+1))
          fi
          
          if ! grep -q "instructions" foundry-agent/agent.yaml; then
            echo "::warning::agent.yaml missing instructions reference"
            ERRORS=$((ERRORS+1))
          fi
          
          TEST_CASES=$(cat eval/dataset.json | grep -c "query" || echo "0")
          echo "Found $TEST_CASES test cases in evaluation dataset"
          
          if [ $ERRORS -gt 0 ]; then
            echo "::error::Static validation found $ERRORS issues"
            echo "validation_passed=false" >> $GITHUB_OUTPUT
          else
            echo "Static validation passed"
            echo "validation_passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Fail if Validation Failed
        if: steps.static-eval.outputs.validation_passed != 'true'
        run: |
          echo "::error::Agent evaluation failed"
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'eval/requirements.txt'

      - name: Install evaluation dependencies
        run: |
          pip install -r eval/requirements.txt

      - name: Run Dynamic Agent Evaluation
        id: dynamic-eval
        env:
          AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}
          AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ secrets.AZURE_AI_MODEL_DEPLOYMENT_NAME }}
          AGENT_NAME: "three-pillars-demo-agent"
          EVAL_DATASET_PATH: "eval/dataset.json"
        run: |
          echo "Running dynamic evaluation against deployed agent..."
          python eval/run_evaluation.py
        continue-on-error: true

      - name: Post Evaluation Results to PR
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_run' && needs.find-pr.outputs.should_evaluate == 'true')
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || needs.find-pr.outputs.pr_number }}
        with:
          script: |
            const evalPassed = '${{ steps.dynamic-eval.outcome }}' === 'success';
            const icon = evalPassed ? '✅' : '❌';
            const status = evalPassed ? 'passed' : 'failed';
            const prNumber = parseInt(process.env.PR_NUMBER);
            
            const body = `## ${icon} Agent Quality Check ${status.toUpperCase()}

            | Metric | Status |
            |--------|--------|
            | Static Validation | ${{ steps.static-eval.outputs.validation_passed == 'true' && '✅ Passed' || '❌ Failed' }} |
            | Dynamic Evaluation | ${evalPassed ? '✅ Passed' : '❌ Failed'} |

            ${evalPassed ? 
              '🎉 All quality thresholds met! This PR is ready for review.' : 
              '⚠️ Quality thresholds not met. Please check the workflow logs for details.'}

            ---
            *Evaluated by [Agent Quality Check](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})*
            `;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if Dynamic Evaluation Failed
        if: steps.dynamic-eval.outcome != 'success'
        run: |
          echo "::error::Dynamic agent evaluation failed - quality thresholds not met"
          exit 1
