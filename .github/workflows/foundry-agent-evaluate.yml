name: Foundry Agent Evaluation

on:
  pull_request:
    paths:
      - 'foundry-agent/**'
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  # Azure AI Foundry Configuration - Set these in repository secrets
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}

jobs:
  evaluate:
    name: Evaluate Agent Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Agent Configuration
        id: validate
        run: |
          echo "Validating Foundry agent configuration..."
          
          # Check required files exist
          if [ ! -f "foundry-agent/agent.yaml" ]; then
            echo "::error::Missing foundry-agent/agent.yaml"
            exit 1
          fi
          
          if [ ! -f "foundry-agent/instructions.md" ]; then
            echo "::error::Missing foundry-agent/instructions.md"
            exit 1
          fi
          
          if [ ! -f "eval/dataset.json" ]; then
            echo "::error::Missing eval/dataset.json"
            exit 1
          fi
          
          echo "All required files present"
          echo "validated=true" >> $GITHUB_OUTPUT

      - name: Run Agent Evaluation
        id: evaluation
        # Using the official Azure AI Agent Evaluation action
        # Docs: https://github.com/marketplace/actions/azure-ai-agent-evaluation
        uses: azure/ai-agent-evaluation@v1
        continue-on-error: true  # Allow workflow to continue for reporting
        with:
          evaluation-dataset: eval/dataset.json
          agent-config: foundry-agent/agent.yaml
          project-endpoint: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}
          evaluators: |
            coherence
            groundedness
            relevance
            fluency
          threshold-coherence: 3.5
          threshold-groundedness: 3.5
          threshold-relevance: 3.5
          threshold-fluency: 3.5

      - name: Fallback Evaluation (if Azure unavailable)
        if: steps.evaluation.outcome == 'failure' || steps.evaluation.outcome == 'skipped'
        id: fallback-eval
        run: |
          echo "Running fallback evaluation (Azure connection unavailable)..."
          echo ""
          echo "=== Agent Configuration ==="
          cat foundry-agent/agent.yaml
          echo ""
          echo "=== Evaluation Dataset ==="
          cat eval/dataset.json | head -50
          echo ""
          echo "=== Static Validation ==="
          
          # Perform static validation checks
          ERRORS=0
          
          # Check agent.yaml structure
          if ! grep -q "name:" foundry-agent/agent.yaml; then
            echo "::warning::agent.yaml missing 'name' field"
            ERRORS=$((ERRORS+1))
          fi
          
          if ! grep -q "instructions" foundry-agent/agent.yaml; then
            echo "::warning::agent.yaml missing 'instructions' reference"
            ERRORS=$((ERRORS+1))
          fi
          
          # Check dataset.json has test cases
          TEST_CASES=$(cat eval/dataset.json | grep -c '"query"' || echo "0")
          echo "Found $TEST_CASES test cases in evaluation dataset"
          
          if [ "$TEST_CASES" -lt 5 ]; then
            echo "::warning::Evaluation dataset should have at least 5 test cases (found $TEST_CASES)"
          fi
          
          if [ $ERRORS -gt 0 ]; then
            echo "::error::Static validation found $ERRORS issues"
            echo "validation_passed=false" >> $GITHUB_OUTPUT
          else
            echo "Static validation passed"
            echo "validation_passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Post Evaluation Results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const evalOutcome = '${{ steps.evaluation.outcome }}';
            const fallbackPassed = '${{ steps.fallback-eval.outputs.validation_passed }}';
            
            let status, details;
            
            if (evalOutcome === 'success') {
              status = '✅ Passed';
              details = 'Azure AI Agent Evaluation completed successfully. All quality thresholds met.';
            } else if (fallbackPassed === 'true') {
              status = '⚠️ Partial';
              details = 'Azure connection unavailable. Fallback static validation passed.';
            } else {
              status = '❌ Failed';
              details = 'Evaluation failed. Please review the workflow logs.';
            }
            
            const body = `## 🧐 Foundry Agent Evaluation Results

**Status**: ${status}

${details}

### Evaluated Components
- ✅ Agent configuration (agent.yaml)
- ✅ Agent instructions (instructions.md)  
- ✅ Evaluation dataset (eval/dataset.json)

### Quality Metrics
| Metric | Threshold | Status |
|--------|-----------|--------|
| Coherence | 3.5 | ${evalOutcome === 'success' ? '✅' : '⚠️ Pending'} |
| Groundedness | 3.5 | ${evalOutcome === 'success' ? '✅' : '⚠️ Pending'} |
| Relevance | 3.5 | ${evalOutcome === 'success' ? '✅' : '⚠️ Pending'} |
| Fluency | 3.5 | ${evalOutcome === 'success' ? '✅' : '⚠️ Pending'} |

---
*Evaluated by [Foundry Agent Evaluation workflow](.github/workflows/foundry-agent-evaluate.yml)*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Fail if Evaluation Failed
        if: steps.evaluation.outcome == 'failure' && steps.fallback-eval.outputs.validation_passed != 'true'
        run: |
          echo "::error::Agent evaluation failed - PR check blocked"
          exit 1
