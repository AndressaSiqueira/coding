name: Continuous Triage (Agentic)

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read
  id-token: write

env:
  AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}
  AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ secrets.AZURE_AI_MODEL_DEPLOYMENT_NAME }}

jobs:
  triage:
    name: AI-Powered Issue Triage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install openai azure-identity

      - name: Classify Issue with AI
        id: classify
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python << 'EOF'
          import os
          import json
          from openai import AzureOpenAI
          from azure.identity import DefaultAzureCredential, get_bearer_token_provider

          # Get issue content
          title = os.environ.get("ISSUE_TITLE", "")
          body = os.environ.get("ISSUE_BODY", "")
          
          # Setup Azure OpenAI client
          endpoint = os.environ["AZURE_AI_PROJECT_ENDPOINT"].replace("/api/projects/ai-project-three-pillars-foundry", "")
          model = os.environ["AZURE_AI_MODEL_DEPLOYMENT_NAME"]
          
          credential = DefaultAzureCredential()
          token_provider = get_bearer_token_provider(credential, "https://cognitiveservices.azure.com/.default")
          
          client = AzureOpenAI(
              azure_endpoint=endpoint,
              azure_ad_token_provider=token_provider,
              api_version="2024-05-01-preview"
          )
          
          # AI classifies the issue
          prompt = f"""Analyze this GitHub issue and classify it.

          Title: {title}
          Body: {body}

          Respond in JSON format:
          {{
            "classification": "bug" | "feature" | "docs" | "question",
            "confidence": 0.0-1.0,
            "summary": "one sentence summary",
            "suggested_action": "what should be done next"
          }}
          
          Only respond with valid JSON, no other text."""

          response = client.chat.completions.create(
              model=model,
              messages=[
                  {"role": "system", "content": "You are a GitHub issue classifier. Respond only with valid JSON."},
                  {"role": "user", "content": prompt}
              ],
              temperature=0.3,
              max_tokens=500
          )
          
          result = response.choices[0].message.content.strip()
          
          # Parse JSON response
          try:
              # Clean markdown code blocks if present
              if result.startswith("```"):
                  result = result.split("```")[1]
                  if result.startswith("json"):
                      result = result[4:]
              analysis = json.loads(result)
          except:
              analysis = {
                  "classification": "question",
                  "confidence": 0.5,
                  "summary": "Could not parse AI response",
                  "suggested_action": "Manual review needed"
              }
          
          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"classification={analysis['classification']}\n")
              f.write(f"confidence={analysis.get('confidence', 0.5)}\n")
              f.write(f"summary={analysis.get('summary', 'N/A')}\n")
              f.write(f"action={analysis.get('suggested_action', 'N/A')}\n")
          
          print(f"AI Classification: {analysis}")
          EOF

      - name: Apply Label and Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const classification = '${{ steps.classify.outputs.classification }}';
            const confidence = '${{ steps.classify.outputs.confidence }}';
            const summary = '${{ steps.classify.outputs.summary }}';
            const action = '${{ steps.classify.outputs.action }}';
            
            const emojis = {
              'bug': '🐛',
              'feature': '✨',
              'docs': '📚',
              'question': '❓'
            };
            
            const emoji = emojis[classification] || '❓';
            
            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [classification]
            });
            
            // AI-generated comment
            const comment = `## 🤖 AI Triage Analysis

            **Classification**: ${emoji} \`${classification}\` (confidence: ${(parseFloat(confidence) * 100).toFixed(0)}%)

            **Summary**: ${summary}

            **Suggested Action**: ${action}

            ---
            *This analysis was performed by Azure OpenAI via [Agentic DevOps](.github/copilot/agentic-workflows/continuous-triage.md).*
            *The AI analyzed the issue title and body to determine the classification.*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });
