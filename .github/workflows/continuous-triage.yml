name: Continuous Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  triage:
    name: Triage New Issue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Read triage workflow intent
        id: intent
        run: |
          echo "Reading agentic workflow definition..."
          cat .github/copilot/agentic-workflows/continuous-triage.md
        
      - name: Classify Issue
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const text = `${title} ${body}`;
            
            // Classification logic based on workflow intent
            let classification = 'question';
            let emoji = '❓';
            
            if (text.match(/bug|error|crash|broken|not working|fail|issue/)) {
              classification = 'bug';
              emoji = '🐛';
            } else if (text.match(/feature|add|implement|enhancement|request|would be nice/)) {
              classification = 'feature';
              emoji = '✨';
            } else if (text.match(/doc|readme|documentation|typo|example|clarif/)) {
              classification = 'docs';
              emoji = '📚';
            }
            
            core.setOutput('classification', classification);
            core.setOutput('emoji', emoji);
            
            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [classification]
            });
            
            // Create summary comment
            const summary = `👋 Thanks for opening this issue!

**Classification**: ${emoji} ${classification}

**Summary**: This issue has been automatically classified based on its content.

**Next Steps**: 
${classification === 'bug' ? '- A maintainer will investigate and prioritize this bug.' : ''}
${classification === 'feature' ? '- This feature request will be reviewed and discussed.' : ''}
${classification === 'docs' ? '- A documentation update may be proposed automatically.' : ''}
${classification === 'question' ? '- Someone from the community or maintainers will respond.' : ''}

---
*This response was generated by the [Continuous Triage workflow](.github/copilot/agentic-workflows/continuous-triage.md).*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: summary
            });
            
            return { classification };

      - name: Propose Docs Update (if docs issue)
        if: steps.classify.outputs.classification == 'docs'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            // Create a tracking comment for docs update
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `📝 **Docs Update Triggered**
              
This issue has been classified as documentation-related. 

The docs-agent will analyze this issue and may propose a documentation update PR.

To manually trigger a docs review, add the \`needs-docs-review\` label.

---
*Automated by Continuous Triage workflow*`
            });
            
            // Add additional label to track docs workflow
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['needs-docs-review']
            });
