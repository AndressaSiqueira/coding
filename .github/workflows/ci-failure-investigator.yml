name: CI Failure Investigator

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID to investigate'
        required: false
        type: string

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  investigate:
    name: Investigate Failure
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Read investigator workflow intent
        run: |
          echo "Reading agentic workflow definition..."
          cat .github/copilot/agentic-workflows/ci-failure-investigator.md

      - name: Get Failed Run Info
        id: run-info
        uses: actions/github-script@v7
        with:
          script: |
            let runId;
            let run;
            
            if (context.eventName === 'workflow_dispatch' && context.payload.inputs?.run_id) {
              runId = parseInt(context.payload.inputs.run_id);
            } else if (context.eventName === 'workflow_run') {
              runId = context.payload.workflow_run.id;
            } else {
              core.setFailed('No run ID available');
              return;
            }
            
            // Get workflow run details
            const { data: workflowRun } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });
            
            // Skip if this is the investigator workflow itself
            if (workflowRun.name === 'CI Failure Investigator') {
              core.notice('Skipping investigation of self');
              core.setOutput('skip', 'true');
              return;
            }
            
            core.setOutput('skip', 'false');
            core.setOutput('run_id', runId);
            core.setOutput('run_name', workflowRun.name);
            core.setOutput('run_url', workflowRun.html_url);
            core.setOutput('head_sha', workflowRun.head_sha);
            core.setOutput('head_branch', workflowRun.head_branch);
            
            return workflowRun;

      - name: Download Logs
        if: steps.run-info.outputs.skip != 'true'
        id: logs
        uses: actions/github-script@v7
        with:
          script: |
            const runId = ${{ steps.run-info.outputs.run_id || 0 }};
            if (!runId) return;
            
            try {
              // Get jobs for the run
              const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId
              });
              
              const failedJobs = jobs.jobs.filter(j => j.conclusion === 'failure');
              
              let analysis = [];
              for (const job of failedJobs.slice(0, 3)) { // Limit to first 3 failed jobs
                const failedSteps = job.steps?.filter(s => s.conclusion === 'failure') || [];
                analysis.push({
                  jobName: job.name,
                  failedSteps: failedSteps.map(s => s.name)
                });
              }
              
              core.setOutput('analysis', JSON.stringify(analysis));
              core.setOutput('failed_job_count', failedJobs.length);
              
            } catch (error) {
              core.warning(`Could not fetch logs: ${error.message}`);
              core.setOutput('analysis', '[]');
            }

      - name: Create Analysis Issue
        if: steps.run-info.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runName = '${{ steps.run-info.outputs.run_name }}';
            const runUrl = '${{ steps.run-info.outputs.run_url }}';
            const runId = '${{ steps.run-info.outputs.run_id }}';
            const analysis = JSON.parse('${{ steps.logs.outputs.analysis }}' || '[]');
            
            // Build analysis summary
            let failureDetails = '';
            if (analysis.length > 0) {
              failureDetails = analysis.map(a => 
                `### Job: ${a.jobName}\nFailed steps: ${a.failedSteps.join(', ') || 'Unknown'}`
              ).join('\n\n');
            } else {
              failureDetails = 'Unable to retrieve detailed failure information.';
            }
            
            const issueBody = `## 🔴 CI Failure Analysis: ${runName}

**Failed Workflow**: ${runName}
**Failed Run**: [View Run](${runUrl})
**Run ID**: ${runId}

### Error Summary
${failureDetails}

### Analysis

This workflow failure has been automatically detected. The details above show which jobs and steps failed.

### Recommended Actions

1. Review the [workflow logs](${runUrl}) for detailed error messages
2. Check recent commits that might have caused the failure
3. If this is a flaky test, consider adding retry logic
4. If this is an infrastructure issue, check service status

### Possibly Related

- Check recent commits on the affected branch
- Review similar past failures

---
*This analysis was generated by the [CI Failure Investigator workflow](.github/copilot/agentic-workflows/ci-failure-investigator.md).*`;

            // Check for existing open issues for this type of failure
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 5
            });
            
            // Create or update issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 CI Failure: ${runName} (#${runId})`,
              body: issueBody,
              labels: ['ci-failure', 'automated']
            });
            
            console.log(`Created issue #${issue.number}`);
